spring.application.name=webscraper
server.port=8080
scraper.robots.enabled=true
scraper.robots.user-agent=SpringBootWebScraper
scraper.robots.timeout-ms=5000
# Jackson: keep JSON output readable during development
spring.jackson.serialization.indent-output=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.webscraper=DEBUG
