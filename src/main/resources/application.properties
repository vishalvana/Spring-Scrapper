spring.application.name=webscraper
server.port=8080
scraper.robots.enabled=true
scraper.robots.user-agent=SpringBootWebScraper
scraper.robots.timeout-ms=5000
# Jackson: keep JSON output readable during development
spring.jackson.serialization.indent-output=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.webscraper=DEBUG

# Persistence: file-based H2 database, stored in ./data relative to where the app runs.
spring.datasource.url=jdbc:h2:file:./data/webscraperdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console for inspecting stored data during development: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
